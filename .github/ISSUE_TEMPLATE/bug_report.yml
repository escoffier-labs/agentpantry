name: Bug report
description: Report a reproducible Agent Pantry problem.
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Commands, config shape, and steps needed to reproduce.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Output from `agentpantry version` and relevant OS/browser details.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Do not paste live cookie values, tokens, or PSKs.
