name: ci
on:
  push:
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
      - '.gitignore'
    branches: [master]
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
      - '.gitignore'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: "1.25.12"
      # scripts/verify is the single local gate (build, vet, test); CI adds -race on top.
      - run: ./scripts/verify
      - run: go test -race ./...

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: "1.25.12"
      # scripts/verify is the single local gate (build, vet, test); CI adds -race on top.
      - run: ./scripts/verify
        shell: bash
      - run: go test -race ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: "1.25.12"
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: "1.25.12"
      - run: go run golang.org/x/vuln/cmd/govulncheck@v1.3.0 ./...

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: "1.25.12"
      - run: go run github.com/securego/gosec/v2/cmd/gosec@v2.27.1 ./...
