<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1380 665" width="1380" height="665">
<!-- svg-source:agentpantry-excalidraw-json -->
<rect x="0" y="0" width="1380" height="665" fill="#ffffff"/>
<style>
text { font-family: "DejaVu Sans", "Liberation Sans", Arial, sans-serif; letter-spacing: 0; }
</style>
<text x="40" y="58.24" text-anchor="start" dominant-baseline="middle" font-size="34" fill="#1f2937">Agent Pantry: authenticated sessions for agent machines</text>
<text x="42" y="95.48" text-anchor="start" dominant-baseline="middle" font-size="18" fill="#4b5563">Opt-in cookie and secret diffs move from a daily-driver browser to agent-owned surfaces over a sealed byte stream.</text>
<rect x="40" y="130" width="300" height="450" rx="18" ry="18" fill="#eaf4ff" fill-opacity="0.55" stroke="#2563eb" stroke-opacity="0.55" stroke-width="2"/>
<text x="70" y="178.64" text-anchor="start" dominant-baseline="middle" font-size="24" fill="#1d4ed8">Daily driver source</text>
<rect x="75" y="210" width="230" height="82" rx="18" ry="18" fill="#ffffff" fill-opacity="1" stroke="#2563eb" stroke-opacity="1" stroke-width="2"/>
<text x="190" y="246.495" text-anchor="middle" dominant-baseline="middle" font-size="17" fill="#1f2937">Browser profiles</text>
<text x="190" y="267.745" text-anchor="middle" dominant-baseline="middle" font-size="17" fill="#1f2937">Chrome / Firefox / CDP</text>
<rect x="75" y="330" width="230" height="72" rx="18" ry="18" fill="#ffffff" fill-opacity="1" stroke="#2563eb" stroke-opacity="1" stroke-width="2"/>
<text x="190" y="361.495" text-anchor="middle" dominant-baseline="middle" font-size="17" fill="#1f2937">Secrets directory</text>
<text x="190" y="382.745" text-anchor="middle" dominant-baseline="middle" font-size="17" fill="#1f2937">named files only</text>
<rect x="75" y="438" width="230" height="72" rx="18" ry="18" fill="#ffffff" fill-opacity="1" stroke="#2563eb" stroke-opacity="1" stroke-width="2"/>
<text x="190" y="469.495" text-anchor="middle" dominant-baseline="middle" font-size="17" fill="#1f2937">Domain policy</text>
<text x="190" y="490.745" text-anchor="middle" dominant-baseline="middle" font-size="17" fill="#1f2937">allow first, deny wins</text>
<rect x="375" y="130" width="315" height="450" rx="18" ry="18" fill="#eef7f1" fill-opacity="0.55" stroke="#15803d" stroke-opacity="0.55" stroke-width="2"/>
<text x="405" y="178.64" text-anchor="start" dominant-baseline="middle" font-size="24" fill="#166534">Normalize and diff</text>
<rect x="415" y="205" width="235" height="62" rx="18" ry="18" fill="#ffffff" fill-opacity="1" stroke="#15803d" stroke-opacity="1" stroke-width="2"/>
<text x="532.5" y="231.76" text-anchor="middle" dominant-baseline="middle" font-size="16" fill="#1f2937">Copy locked DB</text>
<text x="532.5" y="251.76" text-anchor="middle" dominant-baseline="middle" font-size="16" fill="#1f2937">or ask CDP</text>
<rect x="415" y="295" width="235" height="62" rx="18" ry="18" fill="#ffffff" fill-opacity="1" stroke="#15803d" stroke-opacity="1" stroke-width="2"/>
<text x="532.5" y="321.76" text-anchor="middle" dominant-baseline="middle" font-size="16" fill="#1f2937">Decrypt + normalize</text>
<text x="532.5" y="341.76" text-anchor="middle" dominant-baseline="middle" font-size="16" fill="#1f2937">cookies and secrets</text>
<rect x="415" y="385" width="235" height="62" rx="18" ry="18" fill="#ffffff" fill-opacity="1" stroke="#15803d" stroke-opacity="1" stroke-width="2"/>
<text x="532.5" y="411.76" text-anchor="middle" dominant-baseline="middle" font-size="16" fill="#1f2937">Diff against</text>
<text x="532.5" y="431.76" text-anchor="middle" dominant-baseline="middle" font-size="16" fill="#1f2937">last snapshot</text>
<rect x="415" y="475" width="235" height="62" rx="18" ry="18" fill="#ffffff" fill-opacity="1" stroke="#15803d" stroke-opacity="1" stroke-width="2"/>
<text x="532.5" y="501.76" text-anchor="middle" dominant-baseline="middle" font-size="16" fill="#1f2937">Build one delta</text>
<text x="532.5" y="521.76" text-anchor="middle" dominant-baseline="middle" font-size="16" fill="#1f2937">cookie + secret changes</text>
<rect x="730" y="195" width="235" height="320" rx="18" ry="18" fill="#fff4e6" fill-opacity="0.65" stroke="#d97706" stroke-opacity="0.65" stroke-width="2"/>
<text x="760" y="244.64" text-anchor="start" dominant-baseline="middle" font-size="24" fill="#b45309">Sealed stream</text>
<rect x="762" y="282" width="170" height="74" rx="18" ry="18" fill="#ffffff" fill-opacity="1" stroke="#d97706" stroke-opacity="1" stroke-width="2"/>
<text x="847" y="314.76" text-anchor="middle" dominant-baseline="middle" font-size="16" fill="#1f2937">AES-256-GCM</text>
<text x="847" y="334.76" text-anchor="middle" dominant-baseline="middle" font-size="16" fill="#1f2937">framed delta</text>
<rect x="762" y="385" width="170" height="74" rx="18" ry="18" fill="#ffffff" fill-opacity="1" stroke="#d97706" stroke-opacity="1" stroke-width="2"/>
<text x="847" y="417.76" text-anchor="middle" dominant-baseline="middle" font-size="16" fill="#1f2937">HKDF salt +</text>
<text x="847" y="437.76" text-anchor="middle" dominant-baseline="middle" font-size="16" fill="#1f2937">replay counter</text>
<text x="853.5" y="479.29" text-anchor="middle" dominant-baseline="middle" font-size="14" fill="#4b5563">TCP, SSH stdio, or any</text>
<text x="853.5" y="496.79" text-anchor="middle" dominant-baseline="middle" font-size="14" fill="#4b5563">trusted byte stream</text>
<rect x="1010" y="130" width="330" height="450" rx="18" ry="18" fill="#f3effd" fill-opacity="0.55" stroke="#7c3aed" stroke-opacity="0.55" stroke-width="2"/>
<text x="1040" y="178.64" text-anchor="start" dominant-baseline="middle" font-size="24" fill="#6d28d9">Agent machine sink</text>
<rect x="1047" y="205" width="255" height="66" rx="18" ry="18" fill="#ffffff" fill-opacity="1" stroke="#7c3aed" stroke-opacity="1" stroke-width="2"/>
<text x="1174.5" y="233.76" text-anchor="middle" dominant-baseline="middle" font-size="16" fill="#1f2937">Open frame</text>
<text x="1174.5" y="253.76" text-anchor="middle" dominant-baseline="middle" font-size="16" fill="#1f2937">reject stale counters</text>
<rect x="1047" y="305" width="255" height="66" rx="18" ry="18" fill="#ffffff" fill-opacity="1" stroke="#7c3aed" stroke-opacity="1" stroke-width="2"/>
<text x="1174.5" y="333.76" text-anchor="middle" dominant-baseline="middle" font-size="16" fill="#1f2937">Apply current diff</text>
<text x="1174.5" y="353.76" text-anchor="middle" dominant-baseline="middle" font-size="16" fill="#1f2937">to selected targets</text>
<rect x="1047" y="392" width="255" height="150" rx="18" ry="18" fill="#ffffff" fill-opacity="1" stroke="#7c3aed" stroke-opacity="1" stroke-width="2"/>
<text x="1174.5" y="434.9" text-anchor="middle" dominant-baseline="middle" font-size="15" fill="#1f2937">Surfaces + adapters</text>
<text x="1174.5" y="453.65" text-anchor="middle" dominant-baseline="middle" font-size="15" fill="#1f2937">sidecar SQLite / secrets</text>
<text x="1174.5" y="472.4" text-anchor="middle" dominant-baseline="middle" font-size="15" fill="#1f2937">cookies.txt / gh / OpenClaw</text>
<text x="1174.5" y="491.15" text-anchor="middle" dominant-baseline="middle" font-size="15" fill="#1f2937">Hermes bundle</text>
<text x="1174.5" y="509.9" text-anchor="middle" dominant-baseline="middle" font-size="15" fill="#1f2937">Chrome re-encrypt</text>
<text x="56" y="640.48" text-anchor="start" dominant-baseline="middle" font-size="18" fill="#374151">Security boundary: nothing syncs without an allow policy; values are sealed in transit and written only to sink-owned files.</text>
